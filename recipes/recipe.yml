name: krocbox
description: Krocbox OS | Cloud Native Gaming & DevOps Workstation
base-image: ghcr.io/ublue-os/bluefin-nvidia
image-version: stable

modules:
  - type: os-release
    properties:
      NAME: krocbox
      ID: krocbox
      PRETTY_NAME: Krocbox OS
      DEFAULT_HOSTNAME: krocbox

  - type: rpm-ostree
    install:
      - tailscale
      - ufw
      - htop
      - fastfetch

  - type: default-flatpaks
    configurations:
      - scope: system
        install:
          - org.mozilla.firefox
          - com.discordapp.Discord
          - com.visualstudio.code
          - org.gnome.World.PikaBackup
          - com.spotify.Client
          - com.valvesoftware.Steam
          - io.github.shiftey.Desktop
          - com.getpostman.Postman
          - com.github.tchx84.Flatseal
          - io.missioncenter.MissionCenter
          - org.flameshot.Flameshot
          - it.mijorus.gearlever
          - org.gnome.baobab
          - org.freedesktop.Platform.VulkanLayer.MangoHud
          - net.lutris.Lutris
          
  - type: script
    scripts:
      - branding.sh
      - wallpaper.sh
      
  # Silent boot (optional)
  - type: kargs
    kargs:
      - quiet
      - splash
