name: krocbox
description: Krocbox OS | Cloud Native Gaming & DevOps Workstation
base-image: ghcr.io/ublue-os/bazzite-dx
image-version: stable

modules:
  - type: os-release
    properties:
      NAME: krocbox
      ID: krocbox
      PRETTY_NAME: Krocbox OS
      DEFAULT_HOSTNAME: krocbox

  - type: rpm-ostree
    install:
      - tailscale
      - starship
      - ufw
      - htop
      - fastfetch

  - type: default-flatpaks
    install:
      - org.mozilla.firefox
      - com.discordapp.Discord
      - com.visualstudio.code
      - org.gnome.World.PikaBackup
      - com.spotify.Client

  - type: script
    scripts:
      - branding.sh
